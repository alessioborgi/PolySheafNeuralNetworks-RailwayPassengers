method: grid
project: ChebGNN
metric:
  name: val_mean
  goal: maximize

parameters:
  dataset:
    # values: [Texas, Wisconsin, Cornell, Film, Squirrel, Chameleon, Cora, CiteSeer, PubMed]
    values: [Chameleon, Cora, CiteSeer, PubMed]

  K:
    values: [2, 3, 4, 5, 8, 12, 16]
  hidden:
    values: [8, 16, 32]
  layers:
    values: [2, 3, 4, 5, 6, 7, 8]
  dropout:
    values: [0.3, 0.5]
  lr:
    values: [0.01, 0.005]
  weight_decay:
    values: [0.0005, 0.001]
  use_gate:
    values: [true, false]
  highpass:
    values: [true, false]
  convex_mixture:
    values: [true]

command:
  - ${env}
  - python
  - models/tests_and_experiments/baseline/baseline.py
  - --wandb_agent
  - --project
  - ChebGNN
  - --datasets
  - ${dataset}
