name: nsd-mac
channels:
  - conda-forge
  - pytorch
  - defaults

dependencies:
  - python=3.9.9
  - pip=21.3.1
  - pytorch>=1.12         # MPS‐enabled build on macOS
  - torchvision
  - torchaudio
  - pip:
      - torch-householder==1.0.1
      - tqdm==4.62.3
      - pytest==6.2.5
      - wandb==0.13.1
      - torchdiffeq==0.2.2
      - networkx==2.6.3
      - matplotlib==3.9.4
      - dgl==1.1.2
      - lie-learn     # Lie group and Lie algebra computations



# After this, please run the following command to create the environment:
#     conda env create -f environment_gpu_mac.yaml

# To activate the environment, use:
#     conda activate nsd-mac

# You will also need to install additional packages:
    # pip install torch-scatter torch-sparse torch-cluster pandas torch-spline-conv torch-geometric \
    # -f https://data.pyg.org/whl/torch-1.12.0+cpu.html
